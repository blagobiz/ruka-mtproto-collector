name: Update RUKA MTProto Lists

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect fresh MTProto proxies
        run: python main.py --top 200

      - name: Copy public files to root
        run: |
          cp verified/proxy_ru_verified.txt proxy_ru.txt
          cp verified/proxy_eu_verified.txt proxy_eu.txt
          cp verified/proxy_all_verified.txt proxy_all.txt

      - name: Commit changes if lists changed
        run: |
          git config user.name "RUKA Collector Bot"
          git config user.email "bot@users.noreply.github.com"
          git add verified/ proxy_ru.txt proxy_eu.txt proxy_all.txt || true
          git diff --staged --quiet || git commit -m "Update MTProto lists $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || true
